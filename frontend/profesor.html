<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profesor - Mario Kart Lector</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Banner superior -->
  <header class="banner">
    <img src="assets/profesor/banner.png" alt="Mario Kart Lector">
  </header>

  <!-- Contenido principal -->
  <main class="main-container">

    <!-- Panel del circuito -->
    <section class="panel panel-circuito">

      <div class="panel-header">
        <img src="assets/profesor/profe.png" alt="Profesor">
      </div>

      <!-- Circuito -->
      <div id="circuito-container">
        <img src="assets/circuitos/circuito1.png" alt="Circuito" id="circuito">
        <div id="coches-container"></div>
      </div>

      <!-- Crear alumno -->
      <div class="panel panel-crear">
        <h2>Crear nuevo alumno</h2>

        <form id="crearAlumnoForm">
          <input 
            type="text" 
            id="nombreAlumno" 
            placeholder="Nombre del alumno" 
            required
          >

          <select id="cocheAlumno">
            <option value="coche1">Coche Rojo</option>
            <option value="coche2">Coche Verde</option>
            <option value="coche3">Coche Azul</option>
            <option value="coche4">Coche Amarillo</option>
          </select>

          <button type="submit">Crear alumno</button>
        </form>

        <p id="mensajeCrear"></p>
      </div>

      <!-- Logout -->
      <button type="button" id="logoutBtn">Cerrar sesión</button>

    </section>

  </main>

  <!-- Scripts -->
  <script type="module" src="js/circuito.js"></script>
  <script type="module" src="js/profesor.js"></script>

</body>
</html>
