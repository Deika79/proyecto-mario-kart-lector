<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profesor - Mario Kart Lector</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Banner superior -->
  <header class="banner">
    <img src="assets/profesor/banner.png" alt="Mario Kart Lector">
  </header>

  <!-- Contenido principal -->
  <main class="main-container">

    <!-- Panel del circuito -->
    <section class="panel panel-circuito">

      <div class="panel-header">
        <img src="assets/profesor/profe.png" alt="Profesor">
      </div>

      <!-- Circuito -->
      <div id="circuito-container">
        <img src="assets/circuitos/circuito1.png" alt="Circuito" id="circuito">
        <div id="coches-container"></div>
      </div>

      <div class="panel panel-ranking">

        <h2>🏆 Ranking de lectura</h2>

        <ol id="rankingLista" class="ranking-lista"></ol>

      </div>

      <br>

      <br>
      <a href="alumnos.html">
      <button>Gestionar alumnos</button>
      </a>

      <button type="button" id="logoutBtn">Cerrar sesión</button>

    </section>

  </main>

  <!-- Scripts -->
  <script type="module" src="js/circuito.js"></script>
  <script type="module" src="js/profesor.js"></script>

</body>
</html>
