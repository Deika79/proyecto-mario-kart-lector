<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Padre - Mario Kart Lector</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <h1>Padre - Añadir Minutos</h1>

  <div class="form-container">
    <form id="registroForm">

      <label for="alumnoId">Alumno:</label>
      <select id="alumnoId" required></select>

      <label for="minutos">Minutos leídos hoy:</label>
      <input type="number" id="minutos" min="1" required>

      <button type="submit">Registrar Minutos</button>
      <button type="button" id="logoutBtn">Cerrar sesión</button>

    </form>
  </div>

  <div id="mensaje"></div>

  <!-- CIRCUITO -->

  <h2 style="margin-top:40px;">🏁 Carrera de lectura</h2>

  <div id="circuito-container">
    <img src="assets/circuitos/circuito1.png" alt="Circuito" id="circuito">
    <div id="coches-container"></div>
  </div>

  <!-- RANKING -->

  <div class="panel panel-ranking" style="margin-top:40px; max-width:600px;">

    <h2>🏆 Ranking de lectura</h2>

    <ol id="rankingLista" class="ranking-lista"></ol>

  </div>

  <script type="module" src="js/padre.js"></script>

</body>
</html>
