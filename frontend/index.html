<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mario Kart Lector - Login</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="login-container">

    <h1>Mario Kart Lector</h1>

    <form id="loginForm">

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Introduce tu email" required>

      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="Introduce tu contraseña" required>

      <button type="submit">Entrar</button>

    </form>

    <p id="errorMensaje" style="color:red;"></p>

  </div>

  <script type="module" src="js/auth.js"></script>

</body>
</html>
