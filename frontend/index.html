<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Mario Kart Lector - Login</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/styles.css">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff512f">

</head>

<body>

  <div class="login-container">

    <h1>Mario Kart Lector</h1>

    <form id="loginForm">

      <label for="email">Email</label>
      <input
        type="email"
        id="email"
        placeholder="Introduce tu email"
        required
      >

      <label for="password">Contraseña</label>

      <!-- Contenedor contraseña + icono -->
      <div class="password-container">

        <input
          type="password"
          id="password"
          placeholder="Introduce tu contraseña"
          required
        >

        <span id="togglePassword">👁️</span>

      </div>

      <button type="submit">Entrar</button>

    </form>

    <p id="errorMensaje" style="color:red;"></p>

  </div>


  <!-- JS LOGIN -->
  <script type="module" src="js/auth.js"></script>


  <!-- Despertar backend -->
  <script>
    async function wakeBackend() {
      try {
        await fetch("https://mario-kart-lector-backend.onrender.com/ping");
      } catch (e) {
        console.log("Backend despertando...");
      }
    }

    wakeBackend();
  </script>


</body>
</html>
