<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gestión de alumnos</title>
<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<header class="banner">
<img src="assets/profesor/banner.png" alt="Mario Kart Lector">
</header>

<main class="main-container">

<section class="panel">

<div class="panel-header">
<img src="assets/profesor/profe.png">
<h2>Gestión de alumnos</h2>
</div>

<form id="crearAlumnoForm">

<label>Nombre alumno</label>
<input type="text" id="nombreAlumno" required>

<label>Coche</label>
<select id="cocheAlumno">
<option value="coche1">Coche rojo</option>
<option value="coche2">Coche verde</option>
<option value="coche3">Coche azul</option>
<option value="coche4">Coche amarillo</option>
</select>

<button type="submit">Crear alumno</button>

</form>

<p id="mensajeCrear"></p>

<hr style="margin:30px 0">

<h3>Alumnos actuales</h3>

<ul id="listaAlumnos"></ul>

<hr style="margin:30px 0">

<h3>⚠️ Reiniciar curso</h3>

<button id="resetClaseBtn">
Reiniciar clase (borrar todos los datos)
</button>

<br><br>

<button id="volverBtn">Volver</button>

</section>

</main>

<!-- MODAL CREAR PADRE -->

<div id="modalPadre" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">

<div style="background:white; padding:30px; width:420px; margin:120px auto; border-radius:10px;">

<h3>Crear usuario padre</h3>

<form id="crearPadreForm">

<input type="hidden" id="padreAlumnoId">

<label>Nombre padre</label>
<input type="text" id="padreNombre" required>

<label>Email</label>
<input type="email" id="padreEmail" required>

<label>Password</label>
<input type="text" id="padrePassword" readonly>

<br>

<button type="button" id="generarPasswordBtn">
Generar nueva contraseña
</button>

<p id="passwordGenerada"></p>

<button type="button" id="copiarPasswordBtn">
Copiar contraseña
</button>

<br><br>

<button type="submit">Crear usuario</button>

<button type="button" id="cancelarPadre">Cancelar</button>

</form>

<p id="mensajePadre"></p>

</div>

</div>

<script type="module" src="js/alumnos.js"></script>

</body>
</html>
